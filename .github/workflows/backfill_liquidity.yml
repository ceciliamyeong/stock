name: Backfill Liquidity (2022~)

on:
  workflow_dispatch:
    inputs:
      start:
        description: "Start date (YYYY-MM-DD)"
        required: true
        default: "2022-01-01"
      end:
        description: "End date (YYYY-MM-DD)"
        required: true
        default: "2022-01-31"
      market:
        description: "Market: KOSPI | KOSDAQ | BOTH"
        required: true
        default: "BOTH"
      cleanup:
        description: "Run cleanup_liquidity_daily.py? (YES/NO)"
        required: true
        default: "NO"

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Backfill liquidity
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ inputs.market }}" = "BOTH" ]; then
            python scripts/backfill_liquidity.py --start "${{ inputs.start }}" --end "${{ inputs.end }}" --market "KOSPI"
            python scripts/backfill_liquidity.py --start "${{ inputs.start }}" --end "${{ inputs.end }}" --market "KOSDAQ"
          else
            python scripts/backfill_liquidity.py --start "${{ inputs.start }}" --end "${{ inputs.end }}" --market "${{ inputs.market }}"
          fi


      - name: Cleanup liquidity_daily.csv (optional)
        if: ${{ inputs.cleanup == 'YES' }}
        run: |
          python scripts/cleanup_liquidity_daily.py

      - name: Rebuild derived outputs
        run: |
          python scripts/build_liquidity_signals.py
          python scripts/build_liquidity_charts.py
          python scripts/build_dashboard_close.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"
          git add data/

          git commit -m "backfill liquidity: ${{ inputs.start }}~${{ inputs.end }} (${{ inputs.market }})" || echo "No changes"
          git push
