name: KRX Flow Daily

on:
  schedule:
    - cron: "30 9 * * *"   # 18:30 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install pykrx pandas matplotlib squarify requests  # 직접 명시
          
      # 🔥 2월 27일 데이터를 처리하고 대시보드까지 생성합니다.
      - name: Run Scripts
        run: |
          python scripts/run_daily.py
          python scripts/build_dashboard_close.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"
          # ✅ 개별 파일 대신 data 폴더 전체를 추가하여 누락 방지
          git add data/ || true
          
          # 변경사항이 있을 때만 커밋
          if ! git diff --cached --quiet; then
            git commit -m "Daily update (2026-02-27)"
            git push
          else
            echo "No changes to commit"
          fi
