name: KRX Flow Daily

on:
  schedule:
    - cron: "30 9 * * *"   # 18:30 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 🔥 2월 27일 데이터를 처리하고 대시보드까지 생성합니다.
      - name: Run Scripts
        run: |
          python scripts/run_daily.py
          python scripts/build_dashboard_close.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"
          # ✅ 데이터, 대시보드 JSON, 차트 PNG를 모두 포함하도록 수정
          git add data/derived/*.csv data/derived/*.json data/derived/dashboard/*.json data/derived/charts/*.png || true
          git commit -m "Daily update (2026-02-27)" || echo "No changes"
          git push
