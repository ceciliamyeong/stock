name: KRX Flow Daily

on:
  schedule:
    - cron: "30 9 * * *"   # 18:30 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install pykrx==1.2.4 pandas matplotlib squarify requests lxml

      - name: Versions
        run: |
          python -c "import sys,pykrx,pandas; print(sys.version); print('pykrx',pykrx.__version__); print('pandas',pandas.__version__)"
          
      
      - name: Run Scripts
        run: |
          python scripts/run_daily.py
          python scripts/build_liquidity_signals.py
          python scripts/build_liquidity_charts.py
          python scripts/build_dashboard_close.py

      - name: Check treemap outputs
        run: |
          ls -la data/derived/charts || true
          ls -la data/derived/charts | sed -n '1,120p'
          ls -la data/derived/dashboard || true
          python -c "import json; print(json.load(open('data/derived/dashboard/latest.json','r',encoding='utf-8')).get('extras',{}).get('top10_error'))"    

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"
          git add data/
      
          if ! git diff --cached --quiet; then
            TODAY=$(date +'%Y-%m-%d')
            git commit -m "Daily update (${TODAY})"
            git pull --rebase origin main
            git push
          else
            echo "No changes to commit"
          fi
