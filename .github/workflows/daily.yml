name: KRX Flow Daily

on:
  schedule:
    - cron: "30 9 * * *"   # 18:30 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 🔎 투자자 데이터 단독 테스트 (실패해도 계속 진행)
      - name: Test investor fetch
        run: python scripts/krx_fetch_investor.py --start "2026-01-01" --end "2026-02-28" --market BOTH --mode daily
        continue-on-error: true

      # 🔥 실제 실행
      - name: Run
        run: python scripts/run_daily.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"
          git add data/derived/*.csv data/derived/*.json data/derived/charts/*.png || true
          git commit -m "Daily update" || echo "No changes"
          git push
