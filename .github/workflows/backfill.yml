name: KRX Backfill (Chunk)

on:
  workflow_dispatch:
    inputs:
      start:
        description: "YYYY-MM-DD"
        required: true
        default: "2022-01-01"
      end:
        description: "YYYY-MM-DD"
        required: true
        default: "2022-01-31"
      market:
        description: "KOSPI or KOSDAQ or BOTH"
        required: true
        default: "BOTH"

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Backfill chunk
        run: |
          python scripts/backfill_chunk.py --start "${{ inputs.start }}" --end "${{ inputs.end }}" --market "${{ inputs.market }}"

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"
          git add -A
          git commit -m "backfill: ${{ inputs.start }}~${{ inputs.end }} (${{ inputs.market }})" || echo "No changes"
          git push
